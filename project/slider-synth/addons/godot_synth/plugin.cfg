[plugin]

name="Godot Synth"
description="Wavetable synthesizer with MIDI playback and dynamic music system for Godot 4.x. Additive/sine/square/saw/triangle waveforms, ADSR envelopes, polyphonic voice engine, drum synthesis (noise mix, pitch envelopes), beat-synced chord/melody/drum tracks with hot-swappable progressions, and a live patch editor UI."
